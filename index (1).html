<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Larder">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F6F1E9">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Larder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F1E9;--paper2:#EFE6D9;--card:#FFFDF8;--ink:#2A2420;--ink2:#6E6358;
  --line:#E5DAC8;--clay:#C56A4E;--clay-d:#A4502F;--sage:#3E7C6A;--gold:#C99A3B;--green:#4E8C57;
  --shadow:0 1px 2px rgba(42,36,32,.05),0 8px 24px rgba(42,36,32,.06);--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--paper);color:var(--ink);font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.45}
body{padding-bottom:88px;min-height:100vh}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;line-height:1.1}
.wrap{max-width:1080px;margin:0 auto;padding:18px 16px}
.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.brand{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:-.02em}
.brand .dot{color:var(--clay)}
.tagline{color:var(--ink2);font-size:14px;margin:4px 0 18px;font-style:italic;font-family:'Fraunces',serif}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h2{font-size:19px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.card .sub{color:var(--ink2);font-size:13px;margin-bottom:14px}
.eyebrow{text-transform:uppercase;letter-spacing:.12em;font-size:11px;font-weight:700;color:var(--clay);margin-bottom:8px}
.btn{border:none;border-radius:11px;padding:11px 16px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;background:var(--clay);color:#fff;transition:filter .15s}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:var(--paper2);color:var(--ink)}
.btn.sm{padding:7px 12px;font-size:13px}
.btn.sage{background:var(--sage)}
.btn[disabled]{opacity:.4;cursor:default}
.addbar{display:flex;gap:8px;margin-top:8px}
.addbar input{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:15px;color:var(--ink)}
.addbar input:focus{outline:none;border-color:var(--clay)}

/* pantry */
.catname{font-family:'Fraunces';font-weight:600;font-size:15px;margin:16px 0 9px;color:var(--ink)}
.catname:first-child{margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--line);background:var(--paper);border-radius:22px;padding:8px 14px;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.chip.on{background:var(--green);color:#fff;border-color:var(--green)}
.chip .x{opacity:.6;font-weight:700}
.pcount{font-size:13px;color:var(--ink2);font-weight:600}

/* shopping */
.srow{display:flex;align-items:center;gap:13px;padding:12px 2px;border-bottom:1px solid var(--paper2)}
.srow:last-child{border-bottom:none}
.check{width:28px;height:28px;border-radius:9px;border:2px solid var(--line);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--card)}
.check svg{width:16px;height:16px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .15s}
.check.on{background:var(--green);border-color:var(--green)}
.check.on svg{opacity:1}
.srow .nm{flex:1;font-weight:600;font-size:15.5px}
.srow.got .nm{color:var(--ink2);text-decoration:line-through;text-decoration-color:var(--line)}
.del{background:none;border:none;color:var(--line);cursor:pointer;font-size:18px;padding:4px 6px;flex:none}
.del:hover{color:var(--clay)}
.empty{text-align:center;color:var(--ink2);padding:24px 10px;font-size:14px}
.empty .big{font-family:'Fraunces';font-size:18px;color:var(--ink);margin-bottom:4px}

/* cook */
.bucket{font-family:'Fraunces';font-weight:600;font-size:16px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.bucket:first-child{margin-top:0}
.dot{width:9px;height:9px;border-radius:50%}
.rcard{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .12s}
.rcard:hover{border-color:var(--clay)}
.rcard .rt{font-family:'Fraunces';font-weight:600;font-size:17px}
.rcard .rmeta{font-size:12px;color:var(--ink2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.tag{background:var(--paper2);border-radius:20px;padding:1px 9px;font-weight:600;font-size:11px;color:var(--ink2)}
.ready{color:var(--green);font-weight:700}
.miss{color:var(--clay);font-weight:600;font-size:13px;margin-top:8px}
.rcardfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}

/* recipe detail */
.back{background:none;border:none;color:var(--clay);font-weight:700;font-size:14px;cursor:pointer;padding:6px 0;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.stepper{display:inline-flex;align-items:center;gap:12px}
.stepper button{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--paper);font-weight:700;font-size:17px;cursor:pointer;color:var(--ink)}
.stepper .v{font-family:'Fraunces';font-weight:600;font-size:16px;min-width:96px;text-align:center}
.ingline{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--paper2);font-size:15px}
.ingline:last-child{border-bottom:none}
.ingline .q{font-variant-numeric:tabular-nums;color:var(--ink2);min-width:74px;font-weight:600}
.ingline.have{}
.ingline.need .nm2{color:var(--clay);font-weight:600}
.pill{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:auto}
.pill.h{background:#E7F0E9;color:var(--green)}
.pill.n{background:#F7E3DB;color:var(--clay)}
.step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--paper2)}
.step:last-child{border-bottom:none}
.stepn{font-family:'Fraunces';font-weight:600;color:var(--clay);font-size:18px;flex:none;width:24px}
.muted{color:var(--ink2);font-size:13px}

/* manage / add recipe */
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field textarea{width:100%;border:1px solid var(--line);background:var(--paper);border-radius:11px;padding:11px;font-family:inherit;font-size:15px;color:var(--ink)}
.field{margin-bottom:12px}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.footnote{font-size:12px;color:var(--ink2);text-align:center;margin:20px 0 8px;line-height:1.6}

.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(246,241,233,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:50}
.nav button{flex:1;background:none;border:none;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink2);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer}
.nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.7}
.nav button.active{color:var(--clay)}
.badge{position:absolute;top:6px;margin-left:26px;background:var(--clay);color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:0 5px;min-width:16px;text-align:center}
@media(min-width:820px){
  body{padding-bottom:24px}
  .nav{position:sticky;top:0;bottom:auto;border-top:none;border-bottom:1px solid var(--line);max-width:1080px;margin:0 auto;background:transparent;backdrop-filter:none}
  .nav button{flex:none;flex-direction:row;gap:7px;font-size:14px;padding:16px 18px;border-bottom:2px solid transparent}
  .nav button.active{border-bottom-color:var(--clay)}
  .nav button svg{width:18px;height:18px}
  .badge{position:static;margin-left:2px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="brand">Lar<span class="dot">der</span></div></div>
  <div class="tagline">Cook with what you already have.</div>
</div>
<nav class="nav">
  <button data-view="cook" class="active"><svg viewBox="0 0 24 24"><path d="M5 11h14l-1.2 8.2a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8z"/><path d="M8 11a4 4 0 0 1 8 0"/><path d="M12 3v3"/></svg>Cook</button>
  <button data-view="pantry"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M4 9h16M9 4v16"/></svg>Pantry</button>
  <button data-view="shop"><svg viewBox="0 0 24 24"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 3H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg><span id="shopBadgeWrap">Shopping</span></button>
  <button data-view="more"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>More</button>
</nav>
<div class="wrap" id="app"></div>

<script>
/* ---------- storage ---------- */
const KEY='larder_state_v1';
const Store={
  async get(){try{if(window.storage){const r=await window.storage.get(KEY,false);return r&&r.value?JSON.parse(r.value):null;}}catch(e){}try{const v=localStorage.getItem(KEY);return v?JSON.parse(v):null;}catch(e){}return null;},
  async set(o){const s=JSON.stringify(o);try{if(window.storage){await window.storage.set(KEY,s,false);return;}}catch(e){}try{localStorage.setItem(KEY,s);}catch(e){}}
};

/* ---------- vocabulary ---------- */
const CATS=['Produce','Protein','Noodles & grains','Sauces & condiments','Dairy & eggs','Spices & dry','Other'];
const ITEMS=[
  ['garlic','Produce'],['ginger','Produce'],['scallions','Produce'],['onion','Produce'],['carrot','Produce'],['bok choy','Produce'],['mushrooms','Produce'],['chili','Produce'],['lime','Produce'],['cucumber','Produce'],['bell pepper','Produce'],['broccoli','Produce'],['spinach','Produce'],['tomato','Produce'],['cabbage','Produce'],['cilantro','Produce'],
  ['eggs','Dairy & eggs'],['butter','Dairy & eggs'],['milk','Dairy & eggs'],['cheese','Dairy & eggs'],['yogurt','Dairy & eggs'],
  ['chicken','Protein'],['pork','Protein'],['ground pork','Protein'],['beef','Protein'],['tofu','Protein'],['shrimp','Protein'],['salmon','Protein'],['bacon','Protein'],
  ['rice','Noodles & grains'],['ramen noodles','Noodles & grains'],['udon noodles','Noodles & grains'],['rice noodles','Noodles & grains'],['spaghetti','Noodles & grains'],['panko','Noodles & grains'],['flour','Noodles & grains'],['cornstarch','Noodles & grains'],['nori','Noodles & grains'],
  ['soy sauce','Sauces & condiments'],['dark soy sauce','Sauces & condiments'],['fish sauce','Sauces & condiments'],['oyster sauce','Sauces & condiments'],['hoisin','Sauces & condiments'],['mirin','Sauces & condiments'],['rice vinegar','Sauces & condiments'],['sesame oil','Sauces & condiments'],['gochujang','Sauces & condiments'],['miso paste','Sauces & condiments'],['chili oil','Sauces & condiments'],['sriracha','Sauces & condiments'],['tomato paste','Sauces & condiments'],['coconut milk','Sauces & condiments'],['curry paste','Sauces & condiments'],['peanut butter','Sauces & condiments'],['honey','Sauces & condiments'],['ketchup','Sauces & condiments'],
  ['curry powder','Spices & dry'],['five spice','Spices & dry'],['white pepper','Spices & dry'],['chili flakes','Spices & dry'],['cumin','Spices & dry'],['paprika','Spices & dry'],['sesame seeds','Spices & dry'],['peanuts','Spices & dry']
];
const ASSUMED=new Set(['salt','pepper','water','cooking oil','sugar']);
const HOME=['toilet paper','kitchen roll','paper towels','hand soap','dish soap','washing-up sponges','trash bags','laundry detergent','fabric softener','cleaning spray','shampoo','shower gel','toothpaste','deodorant','tissues','cling film','foil','batteries'];

/* ---------- seeded recipes (Asian-leaning) ---------- */
const RECIPES=[
  {id:'r1',name:'Quick miso tantanmen',serves:2,time:'25 min',tags:['ramen','spicy'],
   ing:[{n:'ramen noodles',q:200,u:'g'},{n:'ground pork',q:200,u:'g'},{n:'miso paste',q:2,u:'tbsp'},{n:'peanut butter',q:1,u:'tbsp'},{n:'soy sauce',q:1,u:'tbsp'},{n:'sesame oil',q:1,u:'tbsp'},{n:'garlic',q:2,u:'cloves'},{n:'ginger',q:1,u:'tsp'},{n:'scallions',q:2},{n:'chili oil',opt:true},{n:'eggs',q:2,opt:true}],
   steps:['Brown the ground pork with garlic and ginger until crisp at the edges.','Stir in miso and peanut butter, loosen with a ladle of hot water to a sauce.','Cook the noodles, divide into bowls, pour over the broth and pork.','Top with scallions, chili oil and a soft egg.']},
  {id:'r2',name:'Garlic fried rice',serves:2,time:'15 min',tags:['rice','fast'],
   ing:[{n:'rice',q:300,u:'g'},{n:'eggs',q:2},{n:'garlic',q:3,u:'cloves'},{n:'scallions',q:2},{n:'soy sauce',q:1,u:'tbsp'},{n:'sesame oil',q:1,u:'tsp'}],
   steps:['Fry chopped garlic in oil until pale gold.','Push aside, scramble the eggs, then add cold rice.','Toss hard over high heat, season with soy and sesame oil.','Finish with scallions.']},
  {id:'r3',name:'Bok choy in oyster sauce',serves:2,time:'10 min',tags:['veg','side'],
   ing:[{n:'bok choy',q:300,u:'g'},{n:'garlic',q:2,u:'cloves'},{n:'oyster sauce',q:2,u:'tbsp'},{n:'soy sauce',q:1,u:'tsp'}],
   steps:['Halve the bok choy, blanch 90 seconds, drain.','Sizzle garlic in oil, add oyster and soy sauce with a splash of water.','Pour the sauce over the greens.']},
  {id:'r4',name:'Mapo-style tofu',serves:2,time:'25 min',tags:['tofu','spicy'],
   ing:[{n:'tofu',q:400,u:'g'},{n:'ground pork',q:150,u:'g'},{n:'gochujang',q:2,u:'tbsp'},{n:'garlic',q:2,u:'cloves'},{n:'ginger',q:1,u:'tsp'},{n:'scallions',q:2},{n:'soy sauce',q:1,u:'tbsp'},{n:'cornstarch',q:1,u:'tsp'}],
   steps:['Brown pork with garlic and ginger.','Add gochujang and soy sauce, then a cup of water.','Slide in cubed tofu, simmer gently 5 minutes.','Thicken with cornstarch slurry, finish with scallions.']},
  {id:'r5',name:'10-minute miso soup',serves:2,time:'10 min',tags:['soup','light'],
   ing:[{n:'miso paste',q:2,u:'tbsp'},{n:'tofu',q:150,u:'g'},{n:'scallions',q:1},{n:'nori',opt:true}],
   steps:['Heat 500 ml water, do not boil.','Whisk in miso until smooth.','Add diced tofu and scallions, warm through.','Tear nori over the top.']},
  {id:'r6',name:'Peanut sesame noodles',serves:2,time:'15 min',tags:['noodles','fast'],
   ing:[{n:'rice noodles',q:200,u:'g'},{n:'peanut butter',q:2,u:'tbsp'},{n:'soy sauce',q:1,u:'tbsp'},{n:'rice vinegar',q:1,u:'tbsp'},{n:'sesame oil',q:1,u:'tsp'},{n:'garlic',q:1,u:'clove'},{n:'chili oil',opt:true},{n:'peanuts',opt:true}],
   steps:['Whisk peanut butter, soy, vinegar, sesame oil and grated garlic with warm water to a pourable sauce.','Cook noodles, drain, toss with the sauce.','Top with chili oil and crushed peanuts.']},
  {id:'r7',name:'Gochujang glazed chicken',serves:2,time:'25 min',tags:['chicken','spicy'],
   ing:[{n:'chicken',q:400,u:'g'},{n:'gochujang',q:2,u:'tbsp'},{n:'soy sauce',q:1,u:'tbsp'},{n:'honey',q:1,u:'tbsp'},{n:'garlic',q:2,u:'cloves'},{n:'ginger',q:1,u:'tsp'},{n:'sesame seeds',opt:true},{n:'scallions',opt:true}],
   steps:['Sear bite-size chicken until golden.','Add garlic and ginger, then gochujang, soy and honey.','Toss until glazed and sticky.','Scatter sesame and scallions.']},
  {id:'r8',name:'Shrimp fried rice',serves:2,time:'15 min',tags:['rice','fast'],
   ing:[{n:'rice',q:300,u:'g'},{n:'shrimp',q:200,u:'g'},{n:'eggs',q:2},{n:'scallions',q:2},{n:'soy sauce',q:1,u:'tbsp'},{n:'garlic',q:2,u:'cloves'}],
   steps:['Fry shrimp briefly, set aside.','Scramble eggs, add cold rice and garlic.','Return shrimp, season with soy.','Finish with scallions.']},
  {id:'r9',name:'Yakisoba-style noodles',serves:2,time:'20 min',tags:['noodles','veg'],
   ing:[{n:'udon noodles',q:300,u:'g'},{n:'pork',q:150,u:'g'},{n:'cabbage',q:150,u:'g'},{n:'carrot',q:1},{n:'soy sauce',q:1,u:'tbsp'},{n:'oyster sauce',q:2,u:'tbsp'}],
   steps:['Brown sliced pork, add shredded cabbage and carrot.','Add noodles and a splash of water.','Coat with soy and oyster sauce over high heat.']},
  {id:'r10',name:'Aglio e olio',serves:2,time:'15 min',tags:['pasta','fast'],
   ing:[{n:'spaghetti',q:200,u:'g'},{n:'garlic',q:4,u:'cloves'},{n:'chili flakes',q:1,u:'tsp'}],
   steps:['Boil spaghetti in well-salted water.','Gently fry sliced garlic and chili flakes in plenty of oil.','Toss the pasta with a little starchy water until glossy.']},
  {id:'r11',name:'Soft scrambled eggs',serves:1,time:'8 min',tags:['eggs','breakfast'],
   ing:[{n:'eggs',q:3},{n:'butter',q:1,u:'tbsp'},{n:'cheese',opt:true}],
   steps:['Whisk eggs with a pinch of salt.','Melt butter on low, add eggs, stir constantly.','Pull off heat while still glossy.']},
  {id:'r12',name:'Coconut curry chicken',serves:2,time:'30 min',tags:['curry'],
   ing:[{n:'chicken',q:400,u:'g'},{n:'curry paste',q:2,u:'tbsp'},{n:'coconut milk',q:400,u:'ml'},{n:'onion',q:1},{n:'garlic',q:2,u:'cloves'},{n:'ginger',q:1,u:'tsp'},{n:'fish sauce',q:1,u:'tbsp'}],
   steps:['Soften onion, garlic and ginger.','Fry curry paste 1 minute, add chicken.','Pour in coconut milk, simmer 15 minutes.','Season with fish sauce.']}
];

/* ---------- state ---------- */
let S=null,view='cook',openRecipe=null,detailServes=null,saveTimer=null;
function seed(){return {pantry:{},shopping:[],customItems:[],recipes:[]};}
function persist(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>Store.set(S),250);}
function allItems(){const m=ITEMS.map(([n,c])=>({n,c}));S.customItems.forEach(n=>{if(!m.find(x=>x.n===n))m.push({n,c:'Other'});});return m;}
function allRecipes(){return RECIPES.concat(S.recipes||[]);}
function inPantry(n){return !!S.pantry[n];}
function recipeMissing(r){return r.ing.filter(i=>!i.opt&&!ASSUMED.has(i.n)&&!inPantry(i.n)).map(i=>i.n);}
function pantryCount(){return Object.values(S.pantry).filter(Boolean).length;}
function shopOpen(){return S.shopping.filter(x=>!x.bought).length;}

const app=document.getElementById('app');
function render(){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  const badge=shopOpen();
  const sb=document.getElementById('shopBadgeWrap');
  if(sb)sb.innerHTML='Shopping'+(badge?` <span class="badge">${badge}</span>`:'');
  if(view==='cook')openRecipe?renderDetail():renderCook();
  else if(view==='pantry')renderPantry();
  else if(view==='shop')renderShop();
  else renderMore();
}

/* ---------- cook ---------- */
function renderCook(){
  const list=allRecipes().map(r=>({r,miss:recipeMissing(r)})).sort((a,b)=>a.miss.length-b.miss.length);
  const ready=list.filter(x=>x.miss.length===0);
  const near=list.filter(x=>x.miss.length>=1&&x.miss.length<=2);
  const far=list.filter(x=>x.miss.length>=3);
  const card=(x)=>{
    const r=x.r;
    const foot=x.miss.length===0
      ? `<span class="ready">✓ Ready to cook</span>`
      : `<div style="flex:1"><div class="miss">Missing: ${x.miss.map(esc).join(', ')}</div></div><button class="btn sm sage" data-act="addMiss" data-id="${r.id}">+ to list</button>`;
    return `<div class="rcard" data-act="openRecipe" data-id="${r.id}">
      <div class="rt">${esc(r.name)}</div>
      <div class="rmeta"><span>${r.time}</span>${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="rcardfoot">${foot}</div></div>`;
  };
  const sec=(title,color,arr)=>arr.length?`<div class="bucket"><span class="dot" style="background:${color}"></span>${title} <span class="muted" style="font-weight:400">(${arr.length})</span></div>${arr.map(card).join('')}`:'';
  let body=sec('Ready now','var(--green)',ready)+sec('Almost there','var(--gold)',near)+sec('Needs a shop','var(--clay)',far);
  if(!ready.length&&!near.length){
    body=`<div class="empty"><div class="big">Tell me what you have</div>Tick a few things in Pantry and recipes will surface here. ${pantryCount()===0?'Your pantry is empty right now.':''}</div>`+body;
  }
  app.innerHTML=`<div class="eyebrow">What you can cook</div>${body}`;
}

function renderDetail(){
  const r=allRecipes().find(x=>x.id===openRecipe);
  if(!r){openRecipe=null;return renderCook();}
  if(detailServes==null)detailServes=r.serves;
  const f=detailServes/r.serves;
  const miss=recipeMissing(r);
  const ing=r.ing.map(i=>{
    const have=ASSUMED.has(i.n)||inPantry(i.n)||i.opt&&inPantry(i.n);
    const need=!i.opt&&!ASSUMED.has(i.n)&&!inPantry(i.n);
    let q='';
    if(i.q){const v=+(i.q*f).toFixed(2);q=`${v%1===0?v:v.toFixed(1)}${i.u?' '+i.u:''}`;}
    const pill=ASSUMED.has(i.n)?'<span class="pill h">staple</span>':inPantry(i.n)?'<span class="pill h">have</span>':i.opt?'<span class="pill" style="background:var(--paper2);color:var(--ink2)">optional</span>':'<span class="pill n">need</span>';
    return `<div class="ingline ${need?'need':'have'}"><span class="q">${q||'—'}</span><span class="nm2">${esc(i.n)}</span>${pill}</div>`;
  }).join('');
  const steps=r.steps.map((s,i)=>`<div class="step"><div class="stepn">${i+1}</div><div>${esc(s)}</div></div>`).join('');
  app.innerHTML=`
    <button class="back" data-act="closeRecipe">‹ Back to recipes</button>
    <div class="card" style="margin-top:8px">
      <h2>${esc(r.name)}</h2><div class="sub">${r.time} · ${r.tags.map(esc).join(', ')}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px">
        <div class="stepper"><button data-act="servMinus">−</button><span class="v">${detailServes} serving${detailServes>1?'s':''}</span><button data-act="servPlus">+</button></div>
        ${miss.length?`<button class="btn sm sage" data-act="addMiss" data-id="${r.id}">+ ${miss.length} to list</button>`:'<span class="ready">✓ all in</span>'}
      </div>
      ${ing}
    </div>
    <div class="card"><h2>Method</h2>${steps}</div>`;
}

/* ---------- pantry ---------- */
function renderPantry(){
  const items=allItems();
  const cats=CATS.map(c=>{
    const list=items.filter(i=>i.c===c);
    if(!list.length)return '';
    return `<div class="catname">${c}</div><div class="chips">${list.map(i=>`<button class="chip ${inPantry(i.n)?'on':''}" data-act="togglePantry" data-n="${esc(i.n)}">${esc(i.n)}${inPantry(i.n)?' <span class="x">✓</span>':''}</button>`).join('')}</div>`;
  }).join('');
  app.innerHTML=`
    <div class="card">
      <h2>Pantry <span class="pcount" style="font-weight:400;margin-left:6px">${pantryCount()} in stock</span></h2>
      <div class="sub">Tap what you have. No quantities, just have or have-not. Keep it rough, that is the point.</div>
      <div class="addbar"><input id="pAdd" list="vocab" placeholder="Add something not listed…" maxlength="40"><button class="btn" data-act="pantryAdd">Add</button></div>
    </div>
    <div class="card">${cats}</div>
    ${datalist()}`;
}

/* ---------- shopping ---------- */
function renderShop(){
  const foods=S.shopping.filter(x=>x.cat!=='home');
  const homes=S.shopping.filter(x=>x.cat==='home');
  const boughtCount=S.shopping.filter(x=>x.bought).length;
  const boughtFood=S.shopping.filter(x=>x.bought&&x.cat!=='home').length;
  const row=t=>`<div class="srow ${t.bought?'got':''}"><div class="check ${t.bought?'on':''}" data-act="toggleShop" data-n="${esc(t.name)}"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 6"/></svg></div><div class="nm">${esc(t.name)}</div><button class="del" data-act="delShop" data-n="${esc(t.name)}">×</button></div>`;
  const onList=new Set(S.shopping.map(x=>x.name));
  const chips=HOME.filter(n=>!onList.has(n)).map(n=>`<button class="chip" data-act="addHome" data-n="${esc(n)}">+ ${esc(n)}</button>`).join('');
  app.innerHTML=`
    <div class="card">
      <h2>Groceries</h2>
      <div class="sub">Food and cooking bits. Bought items go into your pantry.</div>
      <div class="addbar"><input id="sAdd" list="vocab" placeholder="Add a grocery…" maxlength="40"><button class="btn" data-act="shopAdd">Add</button></div>
      ${foods.length?(foods.filter(x=>!x.bought).map(row).join('')+foods.filter(x=>x.bought).map(row).join('')):'<div class="empty">No groceries yet. Add some, or use "+ to list" on a recipe.</div>'}
    </div>
    <div class="card">
      <h2>Household</h2>
      <div class="sub">Soap, paper, detergent and other flat stuff. These just get ticked off, never touched by your pantry or recipes.</div>
      <div class="addbar"><input id="sAddHome" placeholder="Add a household item…" maxlength="40"><button class="btn sage" data-act="shopAddHome">Add</button></div>
      ${homes.length?(homes.filter(x=>!x.bought).map(row).join('')+homes.filter(x=>x.bought).map(row).join('')):'<div class="empty" style="padding:14px 10px">Nothing yet.</div>'}
      ${chips?`<div style="margin-top:12px"><div class="muted" style="margin-bottom:8px">Quick add</div><div class="chips">${chips}</div></div>`:''}
    </div>
    ${boughtCount?`<div class="card" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><div style="flex:1;font-size:14px;font-weight:600">${boughtCount} ticked off${boughtFood?` · ${boughtFood} will go to the pantry`:''}</div><button class="btn sage" data-act="stockUp">Put away</button><button class="btn ghost sm" data-act="clearGot">Just clear</button></div>`:''}
    ${datalist()}`;
}
function datalist(){return `<datalist id="vocab">${allItems().map(i=>`<option value="${esc(i.n)}">`).join('')}</datalist>`;}

/* ---------- more ---------- */
function renderMore(){
  const custom=allRecipes().filter(r=>!RECIPES.find(s=>s.id===r.id));
  app.innerHTML=`
    <div class="card">
      <h2>Add your own recipe</h2>
      <div class="sub">Optional, only when you feel like it. One ingredient per line. The starter recipes already work without this.</div>
      <div class="field"><label>Name</label><input id="nrName" placeholder="Grandma's dumplings"></div>
      <div class="field"><label>Time & tags</label><input id="nrMeta" placeholder="30 min, dumplings, weekend"></div>
      <div class="field"><label>Ingredients (one per line, e.g. "soy sauce" or "200 g pork")</label><textarea id="nrIng" placeholder="pork
garlic
soy sauce"></textarea></div>
      <div class="field"><label>Steps (one per line)</label><textarea id="nrSteps" placeholder="Chop everything
Fold and steam"></textarea></div>
      <button class="btn" data-act="addRecipe">Save recipe</button>
    </div>
    ${custom.length?`<div class="card"><h2>Your recipes</h2>${custom.map(r=>`<div class="srow"><div class="nm">${esc(r.name)}</div><button class="del" data-act="delRecipe" data-id="${r.id}">×</button></div>`).join('')}</div>`:''}
    <div class="card">
      <h2>Your data</h2><div class="sub">Stored on this device. Export to back up before any update.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost sm" data-act="export">Export JSON</button><button class="btn ghost sm" data-act="import">Import</button><button class="btn sm" style="background:#F7E3DB;color:var(--clay)" data-act="reset">Reset</button></div>
      <input type="file" id="importfile" accept="application/json" style="display:none">
    </div>
    <div class="footnote">Larder keeps everything on this device. Add to your home screen and it runs like an app.</div>`;
}

/* ---------- helpers ---------- */
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function norm(s){return s.trim().toLowerCase();}

/* ---------- events ---------- */
document.querySelector('.nav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;view=b.dataset.view;openRecipe=null;render();});

document.body.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;const act=el.dataset.act;
  if(act==='openRecipe'){openRecipe=el.dataset.id;detailServes=null;render();}
  else if(act==='closeRecipe'){openRecipe=null;render();}
  else if(act==='servPlus'){detailServes++;render();}
  else if(act==='servMinus'){detailServes=Math.max(1,detailServes-1);render();}
  else if(act==='togglePantry'){const n=el.dataset.n;S.pantry[n]=!S.pantry[n];if(!S.pantry[n])delete S.pantry[n];persist();renderPantry();}
  else if(act==='pantryAdd'){const i=document.getElementById('pAdd'),v=norm(i.value);if(v){if(!ITEMS.find(x=>x[0]===v)&&!S.customItems.includes(v))S.customItems.push(v);S.pantry[v]=true;persist();renderPantry();}}
  else if(act==='shopAdd'){const i=document.getElementById('sAdd'),v=norm(i.value);if(v&&!S.shopping.find(x=>x.name===v)){S.shopping.push({name:v,bought:false,cat:'food'});persist();renderShop();}}
  else if(act==='shopAddHome'){const i=document.getElementById('sAddHome'),v=norm(i.value);if(v&&!S.shopping.find(x=>x.name===v)){S.shopping.push({name:v,bought:false,cat:'home'});persist();renderShop();}}
  else if(act==='addHome'){const v=el.dataset.n;if(!S.shopping.find(x=>x.name===v)){S.shopping.push({name:v,bought:false,cat:'home'});persist();renderShop();}}
  else if(act==='toggleShop'){const t=S.shopping.find(x=>x.name===el.dataset.n);if(t){t.bought=!t.bought;persist();renderShop();}}
  else if(act==='delShop'){S.shopping=S.shopping.filter(x=>x.name!==el.dataset.n);persist();renderShop();}
  else if(act==='addMiss'){const r=allRecipes().find(x=>x.id===el.dataset.id);recipeMissing(r).forEach(n=>{if(!S.shopping.find(x=>x.name===n))S.shopping.push({name:n,bought:false,cat:'food'});});persist();view='shop';openRecipe=null;render();}
  else if(act==='stockUp'){S.shopping.filter(x=>x.bought&&x.cat!=='home').forEach(x=>{S.pantry[x.name]=true;if(!ITEMS.find(i=>i[0]===x.name)&&!S.customItems.includes(x.name))S.customItems.push(x.name);});S.shopping=S.shopping.filter(x=>!x.bought);persist();renderShop();}
  else if(act==='clearGot'){S.shopping=S.shopping.filter(x=>!x.bought);persist();renderShop();}
  else if(act==='addRecipe'){
    const name=document.getElementById('nrName').value.trim();if(!name){alert('Give it a name.');return;}
    const meta=document.getElementById('nrMeta').value.trim();
    const timeM=meta.match(/\d+\s*(min|h|hour)/i);const time=timeM?timeM[0]:'';
    const tags=meta.replace(/\d+\s*(min|h|hour)s?/i,'').split(',').map(s=>s.trim()).filter(Boolean);
    const ing=document.getElementById('nrIng').value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
      const m=l.match(/^([\d.\/]+)\s*([a-zA-Z]+)?\s+(.+)$/);
      if(m)return {n:norm(m[3]),q:parseFloat(m[1])||undefined,u:m[2]||undefined};
      return {n:norm(l)};
    });
    const steps=document.getElementById('nrSteps').value.split('\n').map(s=>s.trim()).filter(Boolean);
    S.recipes.push({id:'u'+Date.now().toString(36),name,serves:2,time:time||'—',tags:tags.length?tags:['mine'],ing,steps});
    persist();view='cook';render();
  }
  else if(act==='delRecipe'){S.recipes=S.recipes.filter(r=>r.id!==el.dataset.id);persist();renderMore();}
  else if(act==='export'){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='larder-backup.json';a.click();}
  else if(act==='import'){document.getElementById('importfile').click();}
  else if(act==='reset'){if(confirm('Wipe all data?')){S=seed();persist();renderMore();}}
});

document.body.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(e.target.id==='pAdd'){document.querySelector('[data-act=pantryAdd]').click();}
  else if(e.target.id==='sAdd'){document.querySelector('[data-act=shopAdd]').click();}
  else if(e.target.id==='sAddHome'){document.querySelector('[data-act=shopAddHome]').click();}
});

document.body.addEventListener('change',e=>{if(e.target.id!=='importfile')return;const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);if(o.pantry&&o.shopping){S=o;if(!S.customItems)S.customItems=[];if(!S.recipes)S.recipes=[];S.shopping.forEach(x=>{if(!x.cat)x.cat='food';});persist();alert('Imported.');render();}else alert('Not a Larder backup.');}catch(err){alert('Could not read that file.');}};r.readAsText(f);});

/* ---------- boot ---------- */
(async function(){S=await Store.get();if(!S||!S.pantry){S=seed();}if(!S.customItems)S.customItems=[];if(!S.recipes)S.recipes=[];(S.shopping||[]).forEach(x=>{if(!x.cat)x.cat='food';});await Store.set(S);render();})();
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
